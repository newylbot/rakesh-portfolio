# Next.js deployment on Netlify.
[build]
  command = "npm run build"
  publish = ".next"
  # Netlify: exit 0 cancels a build, exit 1 continues it.
  # Skip standalone branch deploys, but keep production and PR Deploy Previews.
  ignore = "if [ \"$CONTEXT\" = \"branch-deploy\" ]; then echo 'Skipping standalone branch deploy'; exit 0; else exit 1; fi"

[[plugins]]
  package = "@netlify/plugin-nextjs"

[build.environment]
  NODE_VERSION = "20"
